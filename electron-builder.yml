productName: dzNTS
appId: "com.dzndani.dznts"

directories:
  app: dist
  output: bundle

win:
  icon: app/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
